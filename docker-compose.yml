services:


  db:
    image: postgres:16
    volumes:
      - postgresdata:/var/lib/postgresql/data
    env_file:
      - .env-non-dev
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD","pg_isready","-U","postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  public:
    build:
      context: .
    ports:
      - "8080:8080"
    env_file:
      - .env-non-dev
    depends_on:
      db:
        condition: service_healthy
    command:
      sh -c " alembic upgrade head && gunicorn app.main:app --workers 4 --worker-class uvicorn.workers.UvicornWorker --bind=0.0.0.0:8080"


volumes:
  postgresdata:
